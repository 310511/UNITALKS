# Coturn STUN/TURN Server Configuration for macOS
# Generated setup for IP: 14.195.131.227

# Network configuration
listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0
relay-ip=0.0.0.0
external-ip=14.195.131.227

# Authentication
use-auth-secret
static-auth-key=super-secret-key-change-this-in-production-$(date +%s)
realm=unitalks
max-session-lifetime=86400000

# Transport protocols
udp-enabled=true
tcp-enabled=true
tls-enabled=true
dtls-enabled=true

# TURN relay configuration
total-quota=100
user-quota=12
max-bps=64000

# Security settings
no-multicast-peers
no-loopback-peers
stale-nonce=600
max-allocate-lifetime=3600000

# Logging
log-file=/opt/homebrew/var/log/turnserver.log
verbose
syslog

# Performance
max-connections=1000
thread-pool-size=4

# Mobile and NAT traversal
rtp-timeout-udp=120
rtp-timeout-tcp=300
