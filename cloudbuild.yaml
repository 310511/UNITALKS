steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/${_IMAGE_NAME}', '.']

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/${_IMAGE_NAME}']

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - 'gcr.io/$PROJECT_ID/${_IMAGE_NAME}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'EZOIC_ADSTXT_ACCOUNT_ID=${_EZOIC_ADSTXT_ACCOUNT_ID},EZOIC_DOMAIN=${_EZOIC_DOMAIN}'

images:
  - 'gcr.io/$PROJECT_ID/${_IMAGE_NAME}'

substitutions:
  _SERVICE_NAME: 'random-chat'
  _REGION: 'us-central1'
  _IMAGE_NAME: 'random-chat'
  _EZOIC_ADSTXT_ACCOUNT_ID: '19390'
  _EZOIC_DOMAIN: 'unitalks.in'