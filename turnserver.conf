# Coturn STUN/TURN Server Configuration
# Production-ready configuration for real-time communication

# Network configuration
listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0
relay-ip=0.0.0.0
external-ip=YOUR_PUBLIC_IP

# Authentication
use-auth-secret
static-auth-secret=YOUR_SUPER_SECRET_KEY_HERE
realm=unitalks
max-session-lifetime=86400000

# Transport protocols
udp-enabled=true
tcp-enabled=true
tls-enabled=true
dtls-enabled=true

# TURN relay configuration
total-quota=100
user-quota=12
max-bps=64000
max-bps-per-connection=64000

# Security settings
no-multicast-peers
no-loopback-peers
no-tcp-relay
secure-stun
stale-nonce=600
max-allocate-lifetime=3600000

# Logging and monitoring
log-file=/var/log/turnserver.log
verbose
syslog
no-cli

# Performance tuning
max-connections=1000
max-broadcast-queues=32767
thread-pool-size=4

# SSL/TLS configuration (for TURNS)
cert=/path/to/your/cert.pem
pkey=/path/to/your/private.key
cipher-list="ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-SHA384:ECDHE-RSA-AES128-SHA256"

# Redis configuration (for distributed deployments)
# redis-statsdb="ip=127.0.0.1 port=6379"

# Additional security
denied-peer-ip=127.0.0.1
allowed-peer-ip=0.0.0.0/0

# Mobile and NAT traversal
rtp-timeout-udp=120
rtp-timeout-tcp=300
rtp-timeout-other=300

# Bandwidth management
no-stun
no-software-attribute
no-tcp-keepalive
