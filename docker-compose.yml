version: '3.8'

services:
  # Coturn STUN/TURN Server
  coturn:
    build:
      context: ./coturn
      dockerfile: Dockerfile
    container_name: unitalks-coturn
    restart: unless-stopped
    network_mode: host  # Required for UDP traffic and NAT traversal
    environment:
      - TURN_SECRET_KEY=${TURN_SECRET_KEY:-your-super-secret-key-change-this}
      - TURN_REALM=${TURN_REALM:-unitalks}
      - TURN_PUBLIC_IP=${TURN_PUBLIC_IP:-127.0.0.1}
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
      - ./coturn/certs:/etc/coturn/certs:ro
      - coturn_logs:/var/log/turnserver
    ports:
      - "3478:3478/udp"   # STUN/TURN UDP
      - "3478:3478/tcp"   # STUN/TURN TCP
      - "5349:5349/tcp"   # TURN TLS
      - "49152-49160:49152-49160/udp"  # Relay ports UDP (Reduced range for Windows Docker)
    healthcheck:
      test: ["CMD", "nc", "-z", "-v", "-w", "2", "localhost", "3478"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis for state management and Socket.IO adapter
  redis:
    image: redis:alpine
    container_name: unitalks-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Main application server
  app:
    build:
      context: .
      dockerfile: Dockerfile
    # container_name: unitalks-app # Removed to allow scaling
    restart: unless-stopped
    depends_on:
      - coturn
      - redis
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-5000}
      - SOCKET_URL=${SOCKET_URL:-http://localhost:5000}
      - TURN_SERVER_URL=${TURN_SERVER_URL:-turn:localhost:3478}
      - TURN_SECRET_KEY=${TURN_SECRET_KEY:-your-super-secret-key-change-this}
      - TURN_REALM=${TURN_REALM:-unitalks}
      - TURN_CREDENTIAL_TTL=${TURN_CREDENTIAL_TTL:-3600}
      - STUN_SERVER_URL=${STUN_SERVER_URL:-stun:stun.l.google.com:19302}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-change-me}
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    ports:
      - "5000-5010:5000"
    volumes:
      - app_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-5000}/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx reverse proxy (optional for production)
  nginx:
    image: nginx:alpine
    container_name: unitalks-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  coturn_logs:
    driver: local
  app_logs:
    driver: local
  nginx_logs:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    driver: bridge
